<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📖 สมุดภาพหรรษา อ่านจับใจความ - ป.1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Itim', 'Sarabun', sans-serif;
            background: #aed581;
            background-image: radial-gradient(#80deea 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #fffdf5;
            border-radius: 20px 40px 40px 20px;
            box-shadow: -15px 20px 40px rgba(0,0,0,0.2), inset -5px 0 10px rgba(0,0,0,0.05);
            padding: 40px 40px 50px 60px;
            margin: 20px;
            position: relative;
            background-image: repeating-linear-gradient(transparent, transparent 49px, #e0e0e0 49px, #e0e0e0 50px);
            background-attachment: local;
        }

        /* สันห่วงสมุด */
        .book-spine {
            position: absolute; top: 0; left: 10px; bottom: 0; width: 30px;
            background: linear-gradient(90deg, #81c784, #aed581, #81c784);
            border-right: 2px solid #689f38;
            display: flex; flex-direction: column; justify-content: space-evenly; align-items: center;
            border-radius: 15px 0 0 15px;
        }
        .ring {
            width: 25px; height: 12px; background: #546e7a; border-radius: 6px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }

        h1 { text-align: center; color: #e65100; font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 0 #ffe082; }
        .subtitle { text-align: center; font-size: 1.5rem; color: #7f8c8d; margin-bottom: 30px; }
        
        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Login */
        .login-box { text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.8); border-radius: 30px; }
        .input-name {
            font-family: 'Itim', cursive; font-size: 2.2rem; padding: 15px 30px;
            border: 4px dashed #ff9800; border-radius: 50px; text-align: center;
            width: 90%; max-width: 400px; outline: none; transition: 0.3s; background: #fff8e1;
        }
        .input-name:focus { border-style: solid; box-shadow: 0 0 20px rgba(255, 152, 0, 0.4); }
        
        .btn {
            font-family: 'Itim', cursive; font-size: 2rem; padding: 15px 40px;
            border: none; border-radius: 50px; cursor: pointer; color: white;
            font-weight: bold; transition: 0.1s; display: inline-block; margin: 10px;
        }
        .btn-start { background: #ff7043; box-shadow: 0 8px 0 #d84315; margin-top: 30px; }
        .btn-start:active { transform: translateY(6px); box-shadow: 0 2px 0 #d84315; }
        
        /* หน้าสมุดภาพ (Game) */
        .header-stats { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: bold; color: #2e7d32; margin-bottom: 20px; }
        
        .picture-frame {
            background: #e1f5fe; border: 6px solid #4fc3f7; border-radius: 30px;
            padding: 30px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 0 #0288d1; position: relative;
        }
        .story-emoji { font-size: 8rem; animation: floatEmoji 3s ease-in-out infinite; }
        @keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .sentence-area {
            font-size: 3.5rem; text-align: center; line-height: 1.6; color: #37474f;
            margin-bottom: 30px; font-weight: bold; word-wrap: break-word;
        }
        .blank-space {
            display: inline-block; min-width: 120px; height: 60px;
            border-bottom: 6px dashed #e53935; margin: 0 10px; vertical-align: bottom;
            color: #d32f2f; text-align: center; font-size: 3.5rem; line-height: 50px;
            transition: 0.3s;
        }
        .blank-space.filled { border-bottom: 6px solid #4caf50; color: #2e7d32; }
        
        .btn-read { background: #29b6f6; box-shadow: 0 6px 0 #0288d1; font-size: 1.5rem; padding: 10px 20px; margin-bottom: 20px;}
        .btn-read:active { transform: translateY(4px); box-shadow: 0 2px 0 #0288d1; }

        .choices-area { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .word-choice {
            background: white; border: 4px solid #ab47bc; border-radius: 25px;
            font-size: 3rem; padding: 15px 30px; cursor: pointer; color: #6a1b9a;
            font-family: 'Itim', cursive; font-weight: bold;
            box-shadow: 0 8px 0 #8e24aa; transition: 0.1s;
        }
        .word-choice:active { transform: translateY(4px); box-shadow: 0 2px 0 #8e24aa; }
        .word-choice:hover { background: #f3e5f5; }
        .word-choice.wrong { animation: shake 0.4s; background: #ffcdd2; border-color: #e53935; color: #c62828; box-shadow: 0 8px 0 #b71c1c; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* สรุปผล */
        .score-circle {
            width: 220px; height: 220px; background: #fff9c4; border: 10px solid #ffb300;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 6rem; font-weight: bold; color: #e65100; margin: 0 auto 30px auto;
            box-shadow: 0 10px 30px rgba(255, 179, 0, 0.3);
        }

        #tts-status {
            position: fixed; bottom: 18px; right: 18px; background: rgba(0,0,0,0.8); color: #fff;
            font-size: 1rem; padding: 10px 20px; border-radius: 30px; z-index: 9999; display: none;
        }
        #tts-status.show { display: block; }
        
        .confetti { position: absolute; width: 15px; height: 15px; background: #f00; z-index: 20001; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        @media (max-width: 600px) {
            .container { padding: 30px 20px 40px 40px; }
            h1 { font-size: 2.2rem; }
            .sentence-area { font-size: 2.5rem; }
            .blank-space { min-width: 80px; height: 40px; font-size: 2.5rem; }
            .word-choice { font-size: 2rem; padding: 10px 20px; }
            .story-emoji { font-size: 5rem; }
            .picture-frame { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="tts-status">🔊 กำลังอ่านนิทาน...</div>

<div class="container">
    <!-- สันห่วงสมุด -->
    <div class="book-spine">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>

    <!-- View 1: Login -->
    <div id="view-login" class="view active">
        <h1>📖 สมุดภาพหรรษา</h1>
        <p class="subtitle">ฝึกอ่านจับใจความ เติมคำให้เป็นประโยค</p>
        <div class="login-box">
            <div style="font-size: 5rem; margin-bottom: 10px;">👧📚👦</div>
            <p style="font-size: 2rem; margin-bottom: 15px;">หนูชื่ออะไรเอ่ย?</p>
            <input type="text" id="studentName" class="input-name" placeholder="พิมพ์ชื่อตรงนี้เลย" autocomplete="off">
            <br>
            <button class="btn btn-start" onclick="startGame()">เริ่มอ่านนิทานกัน! ➡️</button>
        </div>
    </div>

    <!-- View 2: Story Game -->
    <div id="view-game" class="view">
        <div class="header-stats">
            <span id="display-name">👨‍🎓 น้อง: -</span>
            <span id="display-progress">หน้าที่: 1/10</span>
        </div>

        <div class="picture-frame">
            <div id="story-picture" class="story-emoji">👨‍🌾 🌾</div>
        </div>

        <div style="text-align: center;">
            <button class="btn btn-read" onclick="readSentenceHint()">🔊 ให้คุณครูอ่านให้ฟัง</button>
        </div>

        <div id="sentence-text" class="sentence-area">
            ตา ไป ทำ <span id="blank-word" class="blank-space"></span>
        </div>

        <div id="choices-container" class="choices-area">
            <!-- ปุ่มตัวเลือกคำศัพท์ -->
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button id="nextBtn" class="btn btn-start" style="display:none;" onclick="nextStory()">เปิดหน้าต่อไป ➡️</button>
        </div>
    </div>

    <!-- View 3: Result -->
    <div id="view-result" class="view">
        <h1>🎉 จบเล่มแล้ว! เก่งมากๆ</h1>
        <p class="subtitle">หนูอ่านจับใจความได้ยอดเยี่ยมเลย</p>
        <div style="text-align: center; padding: 20px;">
            <div class="score-circle" id="final-score">10</div>
            <p id="result-msg" style="font-size: 2.2rem; color: #4e342e; margin-bottom: 30px; font-weight: bold;"></p>
            <button class="btn btn-start" onclick="switchView('view-login')">🏠 เล่นใหม่อีกรอบ</button>
        </div>
    </div>

</div>

<!-- เสียง Effect -->
<audio id="sound-correct" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>

<script>
// =========================================================
// TTS ENGINE (ใช้ Google Translate API)
// =========================================================
var currentAudio = null;

function speakText(txt) {
    if (!txt || !txt.trim()) return;
    if (currentAudio) { currentAudio.pause(); }
    window.speechSynthesis.cancel();
    
    let url = "https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=th&q=" + encodeURIComponent(txt.trim());
    currentAudio = new Audio(url);
    
    let statusEl = document.getElementById('tts-status');
    statusEl.classList.add('show');
    
    currentAudio.onended = () => statusEl.classList.remove('show');
    currentAudio.onerror = () => {
        statusEl.classList.remove('show');
        let u = new SpeechSynthesisUtterance(txt);
        u.lang = 'th-TH'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    };
    currentAudio.play().catch(e => console.log("Audio block", e));
}

// =========================================================
// ฐานข้อมูลนิทาน / ประโยค (อิงคำศัพท์ ป.1)
// =========================================================
const storyDatabase = [
    { pic: "👨‍🌾 🌾", parts: ["ตา", "ไป", "ทำ"], answer: "นา", distractors: ["น้ำ", "ยา", "ตา"] },
    { pic: "🐈 🐟", parts: ["แมว", "ชอบ", "กิน"], answer: "ปลา", distractors: ["หญ้า", "ปู", "งู"] },
    { pic: "🌧️ ☔", parts: ["วัน", "นี้", "มี"], answer: "ฝน", distractors: ["แดด", "ลม", "คน"] },
    { pic: "🐔 🥚", parts: ["แม่", "ไก่", "ออก"], answer: "ไข่", distractors: ["ลูก", "ขน", "ขา"] },
    { pic: "👕 🔴", parts: ["พี่", "ใส่"], answer: "เสื้อ", endPart: "สีแดง", distractors: ["กางเกง", "หมวก", "รองเท้า"] },
    { pic: "🦷 ✨", parts: ["ฉัน", "แปรง"], answer: "ฟัน", endPart: "ทุกวัน", distractors: ["ผม", "หน้า", "ขา"] },
    { pic: "🐕 ❤️", parts: ["ฉัน", "รัก"], answer: "หมา", endPart: "ของฉัน", distractors: ["หมู", "นก", "ช้าง"] },
    { pic: "😴 🛏️", parts: ["น้อง", "นอน"], answer: "หลับ", endPart: "บนเตียง", distractors: ["วิ่ง", "เดิน", "ร้อง"] },
    { pic: "🏫 🎒", parts: ["เรา", "ไป", "โรง"], answer: "เรียน", distractors: ["พยาบาล", "หนัง", "แรม"] },
    { pic: "💧 🥛", parts: ["เรา", "ต้อง", "ดื่ม"], answer: "น้ำ", distractors: ["ไฟ", "ดิน", "ลม"] },
    { pic: "🍚 🥄", parts: ["ฉัน", "กิน"], answer: "ข้าว", endPart: "อร่อย", distractors: ["หญ้า", "ดิน", "ไม้"] },
    { pic: "👂 🎶", parts: ["ฉัน", "ใช้"], answer: "หู", endPart: "ฟังเพลง", distractors: ["ตา", "ปาก", "จมูก"] }
];

let currentStories = [];
let currentIndex = 0;
let score = 0;
let isAnswered = false;

// =========================================================
// ระบบควบคุม (Game Flow)
// =========================================================
function switchView(viewId) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
}

function shuffleArray(arr) {
    let array = arr.slice();
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    const nameInput = document.getElementById('studentName').value.trim();
    if (nameInput === "") { alert("พิมพ์ชื่อก่อนเล่นนะจ๊ะ!"); return; }
    
    document.getElementById('display-name').innerText = "👨‍🎓 น้อง: " + nameInput;
    
    // ปลดล็อก Audio
    let unlockMsg = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(unlockMsg);

    // สุ่มนิทาน 10 หน้า
    currentStories = shuffleArray(storyDatabase).slice(0, 10);
    currentIndex = 0;
    score = 0;

    switchView('view-game');
    loadStory();
}

function loadStory() {
    isAnswered = false;
    let story = currentStories[currentIndex];
    
    document.getElementById('display-progress').innerText = `หน้าที่: ${currentIndex + 1}/10`;
    document.getElementById('story-picture').innerText = story.pic;
    document.getElementById('nextBtn').style.display = 'none';

    // สร้างประโยคแบบมีช่องว่าง
    let sentenceHtml = story.parts.join(" ") + ' <span id="blank-word" class="blank-space"></span>';
    if (story.endPart) {
        sentenceHtml += " " + story.endPart;
    }
    document.getElementById('sentence-text').innerHTML = sentenceHtml;

    // สร้างปุ่มคำตอบ
    let options = shuffleArray([story.answer].concat(story.distractors.slice(0,2)));
    let container = document.getElementById('choices-container');
    container.innerHTML = "";
    
    options.forEach(opt => {
        let btn = document.createElement('button');
        btn.className = 'word-choice';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, story.answer, btn);
        container.appendChild(btn);
    });
}

function readSentenceHint() {
    let story = currentStories[currentIndex];
    let textToRead = story.parts.join(" ") + " ...อะไรเอ่ย? ";
    if (story.endPart) textToRead += story.endPart;
    speakText(textToRead);
}

function checkAnswer(selected, correct, btnElement) {
    if (isAnswered) return;
    
    let blank = document.getElementById('blank-word');

    if (selected === correct) {
        isAnswered = true;
        score++;
        
        // เติมคำลงช่องว่างให้สมบูรณ์
        blank.innerText = selected;
        blank.classList.add('filled');
        
        btnElement.style.background = "#c8e6c9";
        btnElement.style.borderColor = "#4caf50";
        btnElement.style.color = "#2e7d32";

        // เล่นเสียงถูก
        let sound = document.getElementById('sound-correct');
        sound.volume = 0.5; sound.play().catch(e=>{});
        
        shootConfetti();

        // อ่านประโยคเต็มให้ฟังเพื่อย้ำความเข้าใจ
        let story = currentStories[currentIndex];
        let fullSentence = story.parts.join(" ") + " " + selected;
        if (story.endPart) fullSentence += " " + story.endPart;
        
        setTimeout(() => {
            speakText("เก่งมาก " + fullSentence);
        }, 500);

        document.getElementById('nextBtn').style.display = 'inline-block';
        
    } else {
        // ตอบผิด ปุ่มสั่นสีแดง
        btnElement.classList.add('wrong');
        speakText(selected + " ยังไม่ใช่นะ ลองคิดใหม่สิ");
        setTimeout(() => {
            btnElement.classList.remove('wrong');
        }, 500);
    }
}

function nextStory() {
    currentIndex++;
    if (currentIndex < currentStories.length) {
        loadStory();
    } else {
        finishGame();
    }
}

function finishGame() {
    document.getElementById('final-score').innerText = score;
    let msg = score >= 8 ? "หนูอ่านหนังสือเก่งมากๆ เลย!" : "ฝึกอ่านอีกนิด หนูจะเก่งขึ้นแน่นอน!";
    document.getElementById('result-msg').innerText = msg;
    
    speakText("จบเล่มแล้ว ได้คะแนน " + score + " เต็ม 10");
    
    if(score >= 8) {
        setTimeout(shootConfetti, 500);
        setTimeout(shootConfetti, 1500);
    }

    switchView('view-result');
}

// =========================================================
// Animation (พลุกระดาษ)
// =========================================================
function shootConfetti() {
    var colors = ['#f1c40f', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'];
    for(var i=0; i<30; i++) {
        var conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = (Math.random() * 100) + 'vw';
        conf.style.top = '-10px';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
        conf.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(conf);
        setTimeout((function(c) { return function() { c.remove(); } })(conf), 4000);
    }
}
</script>
</body>
</html>
